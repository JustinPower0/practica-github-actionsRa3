name: Deploy to IsardVDI

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH through Bastion
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.TARGET_HOST }}
          username: ${{ secrets.TARGET_USER }}
          key: ${{ secrets.TARGET_KEY }}
          port: 22

          proxy_host: ${{ secrets.BASTION_HOST }}
          proxy_username: ${{ secrets.BASTION_USER }}
          proxy_key: ${{ secrets.BASTION_KEY }}
          proxy_port: 22

          script: |
            cd /var/www/html || exit
            if [ ! -d ".git" ]; then
              git clone https://github.com/JustinPower0/practica-github-actionsRa3.git
            else
              git pull origin main
            fi
            sudo systemctl restart apache2
