name: Deploy to IsardVDI

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH through Bastion
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}

          proxy_host: bastion.elmeuescriptori.cat
          proxy_username: 1d0f3371-3d1b-4734-8e61-e4921dead3ab
          proxy_port: 443
          proxy_key: ${{ secrets.SSH_PRIVATE_KEY }}

          script: |
            cd /var/www/html || exit
            if [ ! -d ".git" ]; then
              git clone https://github.com/JustinPower0/practica-github-actionsRa3.git
            else
              git pull origin main
            fi
            sudo systemctl restart apache2
